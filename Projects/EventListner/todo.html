<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>

    <style>
      * {
        padding: 0;
        margin: 0;
      }

      .contaniner {
        width: 100%;
        height: 100vh;
        margin: auto;
      }
      .todo-contaniner {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        flex-direction: column;
      }

      #task {
        border: 1px solid #ccc;
        outline: none;
        height: 50px;
        padding-left: 10px;
        border-radius: 10px;
        width: 50%;
        margin-top: 10px;
        margin-bottom: 1em;
      }

      #task:focus-visible {
        border: 1px solid #b90000;
      }
      #task:focus-visible::placeholder {
        color: #b900005e;
      }

      .btn {
        display: flex;
        align-items: center;
        gap: 1em;
        margin-top: 30px;
      }
      .btn button {
        width: 100px;
        height: 50px;
        background: #b90000;
        border-radius: 10px;
        color: #fff;
        text-transform: capitalize;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="contaniner">
      <div class="todo-contaniner">
        <h1>To-Do List</h1>
        <input type="text" id="task" placeholder="New Task" />
     <ul id="list">

     </ul>
        <div class="btn">
          <button onclick="addTask()">Add</button>
          <button onclick="clearAll()">Clear All</button>
        </div>
      </div>
    </div>

</html>
